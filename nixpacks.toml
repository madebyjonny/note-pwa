[phases.setup]
nixpkgs = ["php84", "php84Extensions.pcntl", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.pdo_pgsql", "php84Extensions.redis", "nodejs", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "npm run build"]

[phases.start]
cmd = "php artisan reverb:start --host=0.0.0.0 --port=$PORT"
